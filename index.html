<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Compteur de séries</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0f0f;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 36px;
      padding: 20px;
    }

    h1 {
      font-size: 1rem;
      font-weight: 500;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #666;
    }

    /* ── Layout principal ── */
    .main {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      grid-template-rows: auto auto;
      column-gap: 64px;
      row-gap: 0;
      align-items: center;
    }

    .main-title {
      grid-column: 2;
      grid-row: 1;
      font-size: 1rem;
      font-weight: 500;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #666;
      text-align: center;
      padding-bottom: 16px;
    }

    .counter-block  { grid-column: 1; grid-row: 2; justify-self: end; }
    .chrono-block   { grid-column: 3; grid-row: 2; justify-self: start; }

    .divider {
      grid-column: 2;
      grid-row: 1 / 3;
      width: 1px;
      height: 100%;
      min-height: 160px;
      background: #222;
      justify-self: center;
      position: relative;
    }

    /* ── Labels ── */
    .label {
      font-size: 0.7rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #444;
    }

    /* ── Compteur ── */
    .counter-block { display: flex; flex-direction: column; align-items: center; gap: 6px; }

    .count {
      font-size: 7rem;
      font-weight: 700;
      line-height: 1;
      font-variant-numeric: tabular-nums;
      transition: transform 0.1s ease;
    }

    .count.bump { transform: scale(1.1); }

    /* ── Chrono ── */
    .chrono-block { display: flex; flex-direction: column; align-items: center; gap: 12px; }

    .chrono {
      font-size: 6rem;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      letter-spacing: 0.02em;
      color: #ccc;
      transition: color 0.15s;
    }

    .chrono.running { color: #fff; }
    .chrono.paused  { color: #444; }

    .btn-start-stop {
      border: none;
      cursor: pointer;
      border-radius: 20px;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      padding: 7px 22px;
      background: #fff;
      color: #000;
      transition: background 0.15s, transform 0.1s;
    }

    .btn-start-stop:hover { background: #ddd; }
    .btn-start-stop.running { background: #ff4444; color: #fff; }
    .btn-start-stop.running:hover { background: #cc3333; }
    .btn-start-stop:active { transform: scale(0.92); }

    /* ── Boutons compteur ── */
    .controls {
      display: flex;
      gap: 16px;
      align-items: center;
      margin-top: 4px;
    }

    button {
      border: none;
      cursor: pointer;
      border-radius: 50%;
      font-weight: 700;
      transition: background 0.15s, transform 0.1s;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    button:active { transform: scale(0.92); }

    .btn-add {
      width: 80px;
      height: 80px;
      font-size: 2.2rem;
      background: #fff;
      color: #000;
    }

    .btn-add:hover { background: #e0e0e0; }

    .btn-sub {
      width: 56px;
      height: 56px;
      font-size: 1.6rem;
      background: #222;
      color: #fff;
    }

    .btn-sub:hover { background: #333; }

    .btn-reset {
      width: 56px;
      height: 56px;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      background: #1a1a1a;
      color: #555;
      border-radius: 14px;
    }

    .btn-reset:hover { background: #222; color: #888; }

    /* ── Historique ── */
    .history {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
      max-width: 420px;
      min-height: 28px;
    }

    .chip {
      background: #1e1e1e;
      border: 1px solid #2a2a2a;
      border-radius: 20px;
      padding: 4px 14px;
      font-size: 0.82rem;
      color: #aaa;
      font-variant-numeric: tabular-nums;
    }

    .hint {
      font-size: 0.72rem;
      color: #2e2e2e;
      letter-spacing: 0.05em;
      text-align: center;
      line-height: 1.8;
    }
  </style>
</head>
<body>

  <div class="main">
    <!-- Compteur -->
    <div class="counter-block">
      <span class="label">Séries</span>
      <div class="count" id="count">0</div>
      <div class="controls">
        <button class="btn-sub" id="sub" title="−1">−</button>
        <button class="btn-add" id="add" title="+1 (Espace)">+</button>
        <button class="btn-reset" id="reset" title="Reset (R)">RESET</button>
      </div>
    </div>

    <div class="divider">
      <span class="main-title" style="position:absolute; top:-36px; left:50%; transform:translateX(-50%); white-space:nowrap;">Séries</span>
    </div>

    <!-- Chrono -->
    <div class="chrono-block">
      <span class="label">Chrono</span>
      <div class="chrono paused" id="chrono">00:00</div>
      <div style="display:flex; gap:8px;">
        <button class="btn-start-stop" id="startStop">START</button>
        <button class="btn-start-stop" id="resetChrono" style="background:#1e1e1e; color:#555;">RESET</button>
      </div>
    </div>
  </div>

  <div class="history" id="history"></div>

  <p class="hint">
    Espace / + → +1 &nbsp;·&nbsp; R → reset séries<br>
    T → start/stop chrono &nbsp;·&nbsp; C → reset chrono
  </p>

  <script>
    // ── Compteur ──
    let count = 0;
    const countEl = document.getElementById('count');
    const historyEl = document.getElementById('history');

    function setCount(n) {
      count = Math.max(0, n);
      countEl.textContent = count;
      countEl.classList.remove('bump');
      void countEl.offsetWidth;
      countEl.classList.add('bump');
    }

    function saveHistory() {
      if (count === 0 && elapsed === 0) return;
      const chip = document.createElement('div');
      chip.className = 'chip';
      const now = new Date();
      const time = now.toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });
      const chronoStr = elapsed > 0 ? ` · ${formatTime(elapsed)}` : '';
      chip.textContent = `${count} séries${chronoStr} · ${time}`;
      historyEl.prepend(chip);
    }

    document.getElementById('add').addEventListener('click', () => setCount(count + 1));
    document.getElementById('sub').addEventListener('click', () => setCount(count - 1));
    document.getElementById('reset').addEventListener('click', () => {
      saveHistory();
      setCount(0);
    });

    // ── Chrono ──
    let elapsed = 0;
    let startTs = null;
    let timerInterval = null;
    const chronoEl = document.getElementById('chrono');
    const startStopBtn = document.getElementById('startStop');

    function formatTime(ms) {
      const totalSec = Math.floor(ms / 1000);
      const min = Math.floor(totalSec / 60).toString().padStart(2, '0');
      const sec = (totalSec % 60).toString().padStart(2, '0');
      return `${min}:${sec}`;
    }

    function updateChronoDisplay() {
      const current = startTs ? elapsed + (Date.now() - startTs) : elapsed;
      chronoEl.textContent = formatTime(current);
    }

    function startChrono() {
      startTs = Date.now();
      timerInterval = setInterval(updateChronoDisplay, 250);
      chronoEl.classList.remove('paused');
      chronoEl.classList.add('running');
      startStopBtn.textContent = 'STOP';
      startStopBtn.classList.add('running');
    }

    function stopChrono() {
      elapsed += Date.now() - startTs;
      startTs = null;
      clearInterval(timerInterval);
      timerInterval = null;
      updateChronoDisplay();
      chronoEl.classList.remove('running');
      chronoEl.classList.add('paused');
      startStopBtn.textContent = 'START';
      startStopBtn.classList.remove('running');
    }

    function toggleChrono() {
      startTs ? stopChrono() : startChrono();
    }

    function resetChrono() {
      if (startTs) stopChrono();
      elapsed = 0;
      updateChronoDisplay();
    }

    startStopBtn.addEventListener('click', toggleChrono);
    document.getElementById('resetChrono').addEventListener('click', resetChrono);

    // ── Clavier ──
    document.addEventListener('keydown', (e) => {
      if (e.target.tagName === 'INPUT') return;
      if (e.code === 'Space')                     { e.preventDefault(); setCount(count + 1); }
      if (e.key === 'r' || e.key === 'R')         { saveHistory(); setCount(0); }
      if (e.key === '-' || e.key === 'ArrowDown') setCount(count - 1);
      if (e.key === '+' || e.key === 'ArrowUp')   setCount(count + 1);
      if (e.key === 't' || e.key === 'T')         toggleChrono();
      if (e.key === 'c' || e.key === 'C')         resetChrono();
    });
  </script>

</body>
</html>
